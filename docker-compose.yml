services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - 5678:5678
    networks:
      - cyber-labV2
    volumes:
      - ./n8n/data:/home/node/.n8n

  evilginx:
    image: heywoodlh/evilginx2:3.3.0
    container_name: evilginx
    command: -developer
    stdin_open: true
    tty: true
    ports:
      - "80:80"
      - "443:443"
      - "53:53"
    volumes:
      - ./eg2/evilginx:/config
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - cyber-labV2